<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Lab 8</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <h1>Lab 8</h1>

    <button class="burger" id="burgerBtn">☰</button>

    <nav class="nav" id="navMenu">
        <a href="#">🏠 Home</a>
        <a href="#">🖼 Gallery</a>
        <a href="#">⭐ Specials</a>
        <a href="#">📞 Contacts</a>
    </nav>
</header>

<main>
    <h2>Адаптивна сторінка</h2>
    <p>На великому екрані меню відображається повністю, а на меншому — через кнопку-гамбургер.</p>
     <div class="slider">
    <div class="slides" id="slides">
        <img src="https://placehold.co/800x300?text=Slide+1">
        <img src="https://placehold.co/800x300?text=Slide+2">
        <img src="https://placehold.co/800x300?text=Slide+3">
    </div>

    <button class="prev" onclick="prevSlide()">❮</button>
    <button class="next" onclick="nextSlide()">❯</button>

    <div class="dots">
        <span onclick="goToSlide(0)"></span>
        <span onclick="goToSlide(1)"></span>
        <span onclick="goToSlide(2)"></span>
    </div>
</div>
    <section class="large-images">
    <h2>Images for Large screens</h2>
    <img src="https://placehold.co/250x180?text=Large+1" alt="Large image 1">
    <img src="https://placehold.co/250x180?text=Large+2" alt="Large image 2">
    <img src="https://placehold.co/250x180?text=Large+3" alt="Large image 3">
</section>

<section class="medium-images">
    <h2>Images for Medium screens</h2>
    <img src="https://placehold.co/250x180?text=Medium+1" alt="Medium image 1">
    <img src="https://placehold.co/250x180?text=Medium+2" alt="Medium image 2">
    <img src="https://placehold.co/250x180?text=Medium+3" alt="Medium image 3">
</section>

</main>
   
<script src="script.js"></script>

</body>
</html>
