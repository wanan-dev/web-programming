<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Каталог комп'ютерних ігор</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="header-content">
      <h1>Каталог комп'ютерних ігор</h1>
      <p>Пошук, фільтрація та перегляд інформації про популярні ігри</p>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <input type="text" id="searchInput" placeholder="Пошук за назвою гри..." />

      <select id="genreFilter">
        <option value="all">Усі жанри</option>
        <option value="RPG">RPG</option>
        <option value="Action">Action</option>
        <option value="Adventure">Adventure</option>
        <option value="Shooter">Shooter</option>
        <option value="Strategy">Strategy</option>
        <option value="Sport">Sport</option>
      </select>

      <select id="platformFilter">
        <option value="all">Усі платформи</option>
        <option value="PC">PC</option>
        <option value="PlayStation">PlayStation</option>
        <option value="Xbox">Xbox</option>
        <option value="Nintendo Switch">Nintendo Switch</option>
      </select>

      <select id="sortSelect">
        <option value="default">Без сортування</option>
        <option value="rating-desc">Рейтинг: високий → низький</option>
        <option value="year-desc">Рік: нові → старі</option>
        <option value="year-asc">Рік: старі → нові</option>
      </select>
    </section>

    <section class="summary">
      <p id="resultCount"></p>
      <button id="showFavoritesBtn">Показати обране</button>
      <button id="showAllBtn">Показати всі</button>
    </section>

    <section id="gamesList" class="games-list"></section>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button id="closeModal" class="close-btn">×</button>
      <img id="modalImage" src="" alt="Зображення гри" />
      <h2 id="modalTitle"></h2>
      <p id="modalDescription"></p>
      <div class="modal-info">
        <p><strong>Жанр:</strong> <span id="modalGenre"></span></p>
        <p><strong>Рік:</strong> <span id="modalYear"></span></p>
        <p><strong>Платформа:</strong> <span id="modalPlatform"></span></p>
        <p><strong>Рейтинг:</strong> <span id="modalRating"></span></p>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>Командний проєкт з веб-програмування</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
