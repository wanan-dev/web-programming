<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Каталог комп'ютерних ігор</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Каталог комп'ютерних ігор</h1>
    <p>Пошук та перегляд інформації про популярні ігри</p>
  </header>

  <main>
    <section class="controls">
      <input type="text" id="searchInput" placeholder="Введіть назву гри">

      <select id="genreSelect">
        <option value="all">Усі жанри</option>
        <option value="RPG">RPG</option>
        <option value="Action">Action</option>
        <option value="Adventure">Adventure</option>
        <option value="Shooter">Shooter</option>
        <option value="Strategy">Strategy</option>
        <option value="Sport">Sport</option>
      </select>
    </section>

    <p id="countText"></p>

    <section id="gamesList" class="games-list"></section>
  </main>

  <div id="detailsBlock" class="details hidden">
    <div class="details-content">
      <button id="closeBtn">×</button>
      <img id="detailsImage" src="" alt="Зображення гри">
      <h2 id="detailsTitle"></h2>
      <p id="detailsDescription"></p>
      <p><b>Жанр:</b> <span id="detailsGenre"></span></p>
      <p><b>Рік:</b> <span id="detailsYear"></span></p>
      <p><b>Платформа:</b> <span id="detailsPlatform"></span></p>
      <p><b>Рейтинг:</b> <span id="detailsRating"></span></p>
    </div>
  </div>

  <footer>
    <p>Командний проєкт з веб-програмування</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
